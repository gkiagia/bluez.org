<section class="features" id="features">
  <div class="container features-inner">
    <div class="features-description">
      <p>{{ (hugo.Data).features.intro | markdownify | replaceRE "^<p>(.*)</p>\n?$" "$1" | safeHTML }}</p>
    </div>
    <div class="features-list">
      <ul>
        {{ range (hugo.Data).features.items }}
          <li>{{ . }}</li>
        {{ end }}
      </ul>
    </div>
  </div>
</section>
