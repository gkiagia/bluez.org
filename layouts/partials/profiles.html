<section class="profiles" id="profiles">
  <div class="container">
    <h2>{{ (hugo.Data).profiles.heading }}</h2>
    <p class="profiles-sub">{{ (hugo.Data).profiles.intro | markdownify | replaceRE "^<p>(.*)</p>\n?$" "$1" | safeHTML }}</p>
    <div class="profiles-grid">
      {{ range (hugo.Data).profiles.categories }}
        <div class="profile-table">
          <h3>{{ .name }}</h3>
          <ul>
            {{ range .items }}
              <li>{{ . }}</li>
            {{ end }}
          </ul>
        </div>
      {{ end }}
    </div>
  </div>
</section>
