<section class="modules" id="modules">
  <div class="container">
    <h2>{{ (hugo.Data).modules.heading | markdownify | replaceRE "^<p>(.*)</p>\n?$" "$1" | safeHTML }}</h2>
    <div class="modules-grid">
      {{ range (hugo.Data).modules.items }}
        <div class="module-card">
          <p>{{ . }}</p>
        </div>
      {{ end }}
    </div>
  </div>
</section>
